<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Valhalla Skill Tree</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <div class="header">
            <h1>⚔ Valhalla Skills ⚔</h1>
            <div class="points">Runas: <span id="points">0</span></div>
        </div>
        <div class="skill-tree" id="skillTree"></div>
    </div>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div class="modal-icon" id="modalIcon"></div>
            <h2 id="modalTitle"></h2>
            <p id="modalDesc"></p>
            <div id="modalDeps"></div>
            <button id="unlockBtn" class="unlock-btn">Desbloquear</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
